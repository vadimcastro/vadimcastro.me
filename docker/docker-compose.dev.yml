# vadimcastro.me development overrides
# Combined development overrides for standalone project

services:
  frontend:
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NEXT_PUBLIC_ADMIN_NAME=Vadim Castro
      - NEXT_PUBLIC_ADMIN_ROLE=Administrator
      - NEXT_PUBLIC_ADMIN_INITIALS=VC
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      
  api:
    volumes:
      - ../backend:/app
    env_file:
      - ../.env.development
    environment:
      - POSTGRES_DB=vadimcastrome
      - PYTHONPATH=/app
    working_dir: /app

volumes:
  frontend_node_modules:
